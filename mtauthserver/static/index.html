<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7fb;
      color: #222;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
    }

    .code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: #2f5bea;
      margin: 0;
    }

    h1 {
      margin: 1rem 0 0.5rem;
      font-size: 2rem;
    }

    p {
      margin: 0 0 2rem;
      color: #666;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      padding: 0.85rem 1.25rem;
      border-radius: 8px;
      background: #2f5bea;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      background: #2448bd;
    }

    a:focus {
      outline: 3px solid rgba(47, 91, 234, 0.35);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="container">
    <p class="code">404</p>
    <h1>Page Not Found</h1>
    <p>
      Sorry, the page you are looking for does not exist or has been moved.
    </p>
    <a href="/docs">Docs</a>
  </main>
</body>
</html>
